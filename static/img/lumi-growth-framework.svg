<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">개인 AI 비서 성장 프레임워크</title>
  <desc id="desc">페르소나, 장기기억, 스킬, 도메인 아카이브, 자동화 루프가 개인 AI 비서를 운영 파트너로 성장시키는 구조</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="1050" cy="105" r="160" fill="#38bdf8" opacity="0.14"/>
  <circle cx="110" cy="590" r="190" fill="#f472b6" opacity="0.12"/>
  <text x="600" y="78" text-anchor="middle" fill="#f8fafc" font-size="38" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">개인 AI 비서는 ‘운영 구조’로 성장한다</text>
  <text x="600" y="120" text-anchor="middle" fill="#cbd5e1" font-size="20" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">모델 자체보다 중요한 5개의 축: 기억, 절차, 자료, 자동화, 회고</text>

  <g filter="url(#shadow)">
    <rect x="90" y="185" width="190" height="185" rx="24" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.55"/>
    <text x="185" y="235" text-anchor="middle" fill="#bfdbfe" font-size="26" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">페르소나</text>
    <text x="185" y="276" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">말투 · 원칙</text>
    <text x="185" y="306" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">위험 작업 확인</text>
    <text x="185" y="336" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">역할 구분</text>

    <rect x="305" y="185" width="190" height="185" rx="24" fill="url(#card)" stroke="#86efac" stroke-opacity="0.55"/>
    <text x="400" y="235" text-anchor="middle" fill="#bbf7d0" font-size="26" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">장기기억</text>
    <text x="400" y="276" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">선호 · 환경</text>
    <text x="400" y="306" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">반복 기준</text>
    <text x="400" y="336" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">작게, 선명하게</text>

    <rect x="520" y="185" width="190" height="185" rx="24" fill="url(#card)" stroke="#facc15" stroke-opacity="0.65"/>
    <text x="615" y="235" text-anchor="middle" fill="#fde68a" font-size="26" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">스킬</text>
    <text x="615" y="276" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">반복 절차</text>
    <text x="615" y="306" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">검증 순서</text>
    <text x="615" y="336" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">실패 재사용</text>

    <rect x="735" y="185" width="190" height="185" rx="24" fill="url(#card)" stroke="#f9a8d4" stroke-opacity="0.65"/>
    <text x="830" y="235" text-anchor="middle" fill="#fbcfe8" font-size="26" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">아카이브</text>
    <text x="830" y="276" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">큰 자료 묶음</text>
    <text x="830" y="306" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">원문 · 출처</text>
    <text x="830" y="336" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">도메인 지식</text>

    <rect x="950" y="185" width="190" height="185" rx="24" fill="url(#card)" stroke="#c4b5fd" stroke-opacity="0.65"/>
    <text x="1045" y="235" text-anchor="middle" fill="#ddd6fe" font-size="26" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">자동화</text>
    <text x="1045" y="276" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">cron · script</text>
    <text x="1045" y="306" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">정기 보고</text>
    <text x="1045" y="336" text-anchor="middle" fill="#e2e8f0" font-size="17" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">상태 검증</text>
  </g>

  <path d="M185 430 C350 540, 850 540, 1045 430" fill="none" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <polygon points="1056,421 1086,430 1056,439" fill="#67e8f9" opacity="0.8"/>
  <text x="600" y="510" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">주간 회고가 다섯 축을 다시 정렬한다</text>
  <text x="600" y="548" text-anchor="middle" fill="#cbd5e1" font-size="19" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">새 능력 → 실패 교훈 → 스킬/기억 업데이트 → 다음 자동화 개선</text>
</svg>
