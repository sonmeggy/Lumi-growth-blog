<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">자동화 성숙도 비교 그래프</title>
  <desc id="desc">실행만 있는 자동화와 검증 루프가 있는 자동화를 안정성, 복구 속도, 재사용성, 설명 가능성 기준으로 비교한 막대 그래프</desc>
  <rect width="1200" height="675" rx="34" fill="#0b1220"/>
  <text x="600" y="76" text-anchor="middle" fill="#f8fafc" font-size="38" font-weight="900" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">자동화는 실행보다 검증이 중요하다</text>
  <text x="600" y="114" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">검증 루프가 붙으면 실패 대응과 재사용성이 크게 좋아진다</text>

  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <line x1="220" y1="548" x2="1040" y2="548" stroke="#334155" stroke-width="2"/>
    <line x1="220" y1="458" x2="1040" y2="458" stroke="#1e293b" stroke-width="1"/>
    <line x1="220" y1="368" x2="1040" y2="368" stroke="#1e293b" stroke-width="1"/>
    <line x1="220" y1="278" x2="1040" y2="278" stroke="#1e293b" stroke-width="1"/>
    <line x1="220" y1="188" x2="1040" y2="188" stroke="#1e293b" stroke-width="1"/>
    <text x="170" y="553" text-anchor="end" fill="#94a3b8" font-size="16">0</text>
    <text x="170" y="463" text-anchor="end" fill="#94a3b8" font-size="16">25</text>
    <text x="170" y="373" text-anchor="end" fill="#94a3b8" font-size="16">50</text>
    <text x="170" y="283" text-anchor="end" fill="#94a3b8" font-size="16">75</text>
    <text x="170" y="193" text-anchor="end" fill="#94a3b8" font-size="16">100</text>

    <g>
      <text x="292" y="585" text-anchor="middle" fill="#e2e8f0" font-size="18">안정성</text>
      <rect x="250" y="422" width="38" height="126" rx="8" fill="#64748b"/>
      <rect x="300" y="242" width="38" height="306" rx="8" fill="#38bdf8"/>
      <text x="269" y="412" text-anchor="middle" fill="#cbd5e1" font-size="15">35</text>
      <text x="319" y="232" text-anchor="middle" fill="#bae6fd" font-size="15" font-weight="800">85</text>
    </g>
    <g>
      <text x="492" y="585" text-anchor="middle" fill="#e2e8f0" font-size="18">복구 속도</text>
      <rect x="450" y="476" width="38" height="72" rx="8" fill="#64748b"/>
      <rect x="500" y="224" width="38" height="324" rx="8" fill="#38bdf8"/>
      <text x="469" y="466" text-anchor="middle" fill="#cbd5e1" font-size="15">20</text>
      <text x="519" y="214" text-anchor="middle" fill="#bae6fd" font-size="15" font-weight="800">90</text>
    </g>
    <g>
      <text x="692" y="585" text-anchor="middle" fill="#e2e8f0" font-size="18">재사용성</text>
      <rect x="650" y="494" width="38" height="54" rx="8" fill="#64748b"/>
      <rect x="700" y="206" width="38" height="342" rx="8" fill="#38bdf8"/>
      <text x="669" y="484" text-anchor="middle" fill="#cbd5e1" font-size="15">15</text>
      <text x="719" y="196" text-anchor="middle" fill="#bae6fd" font-size="15" font-weight="800">95</text>
    </g>
    <g>
      <text x="892" y="585" text-anchor="middle" fill="#e2e8f0" font-size="18">설명 가능성</text>
      <rect x="850" y="458" width="38" height="90" rx="8" fill="#64748b"/>
      <rect x="900" y="260" width="38" height="288" rx="8" fill="#38bdf8"/>
      <text x="869" y="448" text-anchor="middle" fill="#cbd5e1" font-size="15">25</text>
      <text x="919" y="250" text-anchor="middle" fill="#bae6fd" font-size="15" font-weight="800">80</text>
    </g>

    <rect x="360" y="625" width="22" height="14" rx="3" fill="#64748b"/>
    <text x="392" y="638" fill="#cbd5e1" font-size="16">실행만 있는 자동화</text>
    <rect x="590" y="625" width="22" height="14" rx="3" fill="#38bdf8"/>
    <text x="622" y="638" fill="#cbd5e1" font-size="16">검증 루프가 있는 자동화</text>
  </g>
</svg>
